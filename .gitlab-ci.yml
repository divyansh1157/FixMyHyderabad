stages:
  - format
  - lint
  - type-check
  - test
  - coverage
  - security
  - audit

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/
    - node_modules/

# Formatting Stage
prettier_format:
  stage: format
  image: node:20
  script:
    - npm ci
    - npx prettier --check "**/*.{ts,tsx,js,jsx,json,md}"
  allow_failure: true

# Linting Stage
eslint_lint:
  stage: lint
  image: node:20
  script:
    - npm ci
    - npx eslint .

# Type Checking Stage
typescript_typecheck:
  stage: type-check
  image: node:20
  script:
    - npm ci
    - npx tsc --noEmit

# Testing Stage
jest_test:
  stage: test
  image: node:20
  script:
    - npm ci
    - npm test

# Coverage Stage
coverage_report:
  stage: coverage
  image: node:20
  script:
    - npm ci
    - npm run coverage
  coverage: '/Coverage: \d+\.\d+%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 30 days
  allow_failure: true

# Security Stage
gitleaks_scan:
  stage: security
  image: 
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --verbose --source=$CI_PROJECT_DIR

# Audit Stage
dependency_audit:
  stage: audit
  image: node:20
  script:
    - npm audit || true
    - ls .env.example || (echo ".env.example is missing" && exit 1)
