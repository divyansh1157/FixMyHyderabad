stages:
  - format
  - lint
  - type-check
  - test
  - coverage
  - security
  - audit

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/
    - node_modules/

format_job:
  stage: format
  image: node:20
  script:
    - npm ci
    - npm run format:check
  allow_failure: true

lint_job:
  stage: lint
  image: node:20
  script:
    - npm ci
    - npm run lint

typecheck_job:
  stage: type-check
  image: node:20
  script:
    - npm ci
    - npx tsc --noEmit

test_job:
  stage: test
  image: node:20
  script:
    - npm ci
    - npm test

coverage_job:
  stage: coverage
  image: node:20
  script:
    - npm ci
    - npm run coverage
  coverage: '/Coverage: \d+\.\d+%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 30 days
  allow_failure: true

secret_scanning_job:
  stage: security
  image: 
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --verbose --source=$CI_PROJECT_DIR

dependency_audit_job:
  stage: audit
  image: node:20
  script:
    - npm audit || true
